<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear Team Leader Session</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 500px;
    }
    h1 {
      color: #333;
      margin-bottom: 1rem;
    }
    .status {
      padding: 1rem;
      margin: 1rem 0;
      border-radius: 0.5rem;
      font-weight: 500;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    .log {
      text-align: left;
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
      font-family: monospace;
      font-size: 0.875rem;
      max-height: 300px;
      overflow-y: auto;
    }
    .log-item {
      padding: 0.25rem 0;
      border-bottom: 1px solid #dee2e6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧹 Clear Team Leader Session</h1>
    <p>This will remove all team leader session data and redirect you to the login page.</p>
    
    <div id="status"></div>
    <div id="log" class="log" style="display: none;"></div>
    
    <button onclick="clearSession()">Clear Session & Go to Login</button>
  </div>

  <script>
    function log(message) {
      const logDiv = document.getElementById('log');
      logDiv.style.display = 'block';
      const item = document.createElement('div');
      item.className = 'log-item';
      item.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.appendChild(item);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function clearSession() {
      const statusDiv = document.getElementById('status');
      statusDiv.innerHTML = '<div class="info">Clearing session data...</div>';
      
      log('Starting cleanup process...');

      try {
        // 1. Clear all localStorage
        log('Clearing localStorage...');
        const keys = Object.keys(localStorage);
        log(`Found ${keys.length} localStorage keys`);
        
        keys.forEach(key => {
          log(`Removing: ${key}`);
          localStorage.removeItem(key);
        });
        
        localStorage.clear();
        log('localStorage cleared');

        // 2. Clear sessionStorage
        log('Clearing sessionStorage...');
        sessionStorage.clear();
        log('sessionStorage cleared');

        // 3. Clear all cookies
        log('Clearing cookies...');
        document.cookie.split(";").forEach(function(c) { 
          const cookieName = c.split("=")[0].trim();
          document.cookie = cookieName + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/"; 
          log(`Removed cookie: ${cookieName}`);
        });

        // 4. Unregister service workers
        if ('serviceWorker' in navigator) {
          log('Unregistering service workers...');
          const registrations = await navigator.serviceWorker.getRegistrations();
          log(`Found ${registrations.length} service workers`);
          
          for (const registration of registrations) {
            await registration.unregister();
            log('Service worker unregistered');
          }
        }

        // 5. Clear all caches
        if ('caches' in window) {
          log('Clearing caches...');
          const cacheNames = await caches.keys();
          log(`Found ${cacheNames.length} caches`);
          
          for (const cacheName of cacheNames) {
            await caches.delete(cacheName);
            log(`Cache deleted: ${cacheName}`);
          }
        }

        log('✅ All session data cleared successfully!');
        statusDiv.innerHTML = '<div class="success">✅ Session cleared! Redirecting to login...</div>';
        
        // Redirect to login page
        setTimeout(() => {
          log('Redirecting to login page...');
          window.location.href = '/';
        }, 2000);

      } catch (error) {
        log(`❌ Error: ${error.message}`);
        statusDiv.innerHTML = `<div class="status" style="background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;">❌ Error: ${error.message}</div>`;
      }
    }
  </script>
</body>
</html>
