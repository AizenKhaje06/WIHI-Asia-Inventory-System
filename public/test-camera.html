<!DOCTYPE html>
<html>
<head>
    <title>Camera Test</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            max-width: 600px;
            margin: 0 auto;
        }
        video { 
            width: 100%; 
            max-width: 500px; 
            border: 2px solid #000; 
            border-radius: 8px;
            margin: 20px 0;
        }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            margin: 10px 5px;
            cursor: pointer;
            background: #0070f3;
            color: white;
            border: none;
            border-radius: 6px;
        }
        button:hover {
            background: #0051cc;
        }
        .error { 
            color: #e00; 
            margin: 10px 0; 
            padding: 12px;
            background: #fee;
            border-radius: 6px;
        }
        .success { 
            color: #0a0; 
            margin: 10px 0; 
            padding: 12px;
            background: #efe;
            border-radius: 6px;
        }
        .info {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 6px;
            margin: 10px 0;
        }
        h1 {
            color: #333;
        }
    </style>
</head>
<body>
    <h1>📷 Camera Permission Test</h1>
    
    <div class="info">
        <strong>Purpose:</strong> Test if camera permissions are working in your browser.
    </div>
    
    <button onclick="testCamera()">🎥 Test Camera</button>
    <button onclick="stopCamera()">⏹️ Stop Camera</button>
    
    <div id="status"></div>
    <video id="video" autoplay playsinline style="display:none;"></video>

    <script>
        let currentStream = null;

        async function testCamera() {
            const status = document.getElementById('status');
            const video = document.getElementById('video');
            
            status.innerHTML = '<div class="info">📡 Requesting camera access...</div>';
            
            try {
                // Request camera permission
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                
                // Show video
                video.srcObject = currentStream;
                video.style.display = 'block';
                
                status.innerHTML = '<div class="success">✅ Camera access granted! Camera is working.</div>';
                
                console.log('Camera working successfully');
                
            } catch (error) {
                console.error('Camera error:', error);
                
                let message = '';
                if (error.name === 'NotAllowedError') {
                    message = '❌ <strong>Permission denied.</strong><br><br>' +
                             'Solutions:<br>' +
                             '1. Check browser address bar for camera icon<br>' +
                             '2. Go to chrome://settings/content/camera<br>' +
                             '3. Remove localhost from blocked list<br>' +
                             '4. Refresh this page and try again';
                } else if (error.name === 'NotFoundError') {
                    message = '❌ <strong>No camera found.</strong><br><br>' +
                             'Make sure your device has a camera connected.';
                } else if (error.name === 'NotReadableError') {
                    message = '❌ <strong>Camera in use.</strong><br><br>' +
                             'Close other apps using the camera and try again.';
                } else {
                    message = '❌ <strong>Error:</strong> ' + error.message;
                }
                
                status.innerHTML = '<div class="error">' + message + '</div>';
                video.style.display = 'none';
            }
        }

        function stopCamera() {
            const video = document.getElementById('video');
            const status = document.getElementById('status');
            
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                video.style.display = 'none';
                currentStream = null;
                status.innerHTML = '<div class="info">⏹️ Camera stopped.</div>';
            } else {
                status.innerHTML = '<div class="info">No camera is running.</div>';
            }
        }

        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
