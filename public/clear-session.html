<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Session - Vertex Inventory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        
        h1 {
            color: #1a202c;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        p {
            color: #718096;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .status {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .status.pending {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button.secondary {
            background: #e2e8f0;
            color: #1a202c;
        }
        
        button.secondary:hover {
            background: #cbd5e0;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        .details {
            background: #f7fafc;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }
        
        .details h3 {
            color: #1a202c;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .details ul {
            list-style: none;
            padding: 0;
        }
        
        .details li {
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
            color: #4a5568;
            display: flex;
            justify-content: space-between;
        }
        
        .details li:last-child {
            border-bottom: none;
        }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge.cleared {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge.found {
            background: #fee2e2;
            color: #991b1b;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔧</div>
        <h1>Clear Session Data</h1>
        <p>This tool will clear all stored session data from your browser's localStorage.</p>
        
        <div id="status" class="status pending">
            Ready to clear session data
        </div>
        
        <button onclick="clearSession()" id="clearBtn">
            Clear Session Now
        </button>
        
        <button onclick="checkSession()" class="secondary">
            Check Current Session
        </button>
        
        <div id="details" class="details" style="display: none;">
            <h3>Session Details</h3>
            <ul id="sessionList"></ul>
        </div>
    </div>
    
    <script>
        function clearSession() {
            const btn = document.getElementById('clearBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Clearing...';
            status.className = 'status pending';
            status.textContent = 'Clearing session data...';
            
            setTimeout(() => {
                try {
                    // Clear all session-related items
                    const itemsToClear = [
                        'teamLeaderSession',
                        'x-team-leader-user-id',
                        'x-team-leader-channel',
                        'x-team-leader-role',
                        'isLoggedIn',
                        'username',
                        'userRole',
                        'displayName',
                        'currentUser'
                    ];
                    
                    let clearedCount = 0;
                    itemsToClear.forEach(item => {
                        if (localStorage.getItem(item)) {
                            localStorage.removeItem(item);
                            clearedCount++;
                        }
                    });
                    
                    status.className = 'status success';
                    status.textContent = `✅ Success! Cleared ${clearedCount} session items.`;
                    
                    btn.disabled = false;
                    btn.textContent = 'Clear Again';
                    
                    // Show details
                    checkSession();
                    
                    // Auto-redirect after 2 seconds
                    setTimeout(() => {
                        status.textContent = '✅ Redirecting to login page...';
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1000);
                    }, 2000);
                    
                } catch (error) {
                    status.className = 'status error';
                    status.textContent = '❌ Error: ' + error.message;
                    btn.disabled = false;
                    btn.textContent = 'Try Again';
                }
            }, 500);
        }
        
        function checkSession() {
            const details = document.getElementById('details');
            const sessionList = document.getElementById('sessionList');
            
            const sessionItems = {
                'Admin Session': localStorage.getItem('isLoggedIn'),
                'Username': localStorage.getItem('username'),
                'User Role': localStorage.getItem('userRole'),
                'Display Name': localStorage.getItem('displayName'),
                'Team Leader Session': localStorage.getItem('teamLeaderSession') ? 'Found' : null,
                'Team Leader User ID': localStorage.getItem('x-team-leader-user-id'),
                'Team Leader Channel': localStorage.getItem('x-team-leader-channel'),
                'Team Leader Role': localStorage.getItem('x-team-leader-role')
            };
            
            sessionList.innerHTML = '';
            let hasSession = false;
            
            Object.entries(sessionItems).forEach(([key, value]) => {
                const li = document.createElement('li');
                const badge = value 
                    ? '<span class="badge found">Found</span>' 
                    : '<span class="badge cleared">Cleared</span>';
                li.innerHTML = `<span>${key}</span>${badge}`;
                sessionList.appendChild(li);
                
                if (value) hasSession = true;
            });
            
            details.style.display = 'block';
            
            const status = document.getElementById('status');
            if (hasSession) {
                status.className = 'status error';
                status.textContent = '⚠️ Active session found. Click "Clear Session Now" to remove it.';
            } else {
                status.className = 'status success';
                status.textContent = '✅ No active session found. You\'re good to go!';
            }
        }
        
        // Auto-check on load
        window.addEventListener('load', () => {
            checkSession();
        });
    </script>
</body>
</html>
