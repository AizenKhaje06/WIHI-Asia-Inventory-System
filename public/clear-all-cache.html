<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear All Cache - Vertex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1a202c;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #718096;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .status.info {
            background: #ebf8ff;
            color: #2c5282;
            border: 2px solid #bee3f8;
        }
        .status.success {
            background: #f0fff4;
            color: #22543d;
            border: 2px solid #9ae6b4;
        }
        .status.error {
            background: #fff5f5;
            color: #742a2a;
            border: 2px solid #feb2b2;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #4a5568;
        }
        .btn-secondary:hover {
            box-shadow: 0 10px 20px rgba(74, 85, 104, 0.4);
        }
        .log {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .log-item {
            padding: 5px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .log-item:last-child {
            border-bottom: none;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Clear All Cache</h1>
        <p class="subtitle">Force clear all cached data and service workers</p>
        
        <div id="status" class="status info">
            Ready to clear cache...
        </div>

        <button id="clearBtn" onclick="clearEverything()">
            Clear All Cache & Service Workers
        </button>
        
        <button class="btn-secondary" onclick="window.location.href='/'">
            Go to Login Page
        </button>

        <div class="log" id="log"></div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('log');
        const clearBtn = document.getElementById('clearBtn');

        function addLog(message) {
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            logItem.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEl.appendChild(logItem);
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function clearEverything() {
            clearBtn.disabled = true;
            clearBtn.innerHTML = '<span class="spinner"></span>Clearing...';
            statusEl.className = 'status info';
            statusEl.textContent = 'Clearing cache...';
            logEl.innerHTML = '';

            try {
                // 1. Unregister all service workers
                addLog('Unregistering service workers...');
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                        addLog(`✓ Unregistered service worker: ${registration.scope}`);
                    }
                }

                // 2. Clear all caches
                addLog('Clearing all caches...');
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    for (let cacheName of cacheNames) {
                        await caches.delete(cacheName);
                        addLog(`✓ Deleted cache: ${cacheName}`);
                    }
                }

                // 3. Clear localStorage
                addLog('Clearing localStorage...');
                localStorage.clear();
                addLog('✓ localStorage cleared');

                // 4. Clear sessionStorage
                addLog('Clearing sessionStorage...');
                sessionStorage.clear();
                addLog('✓ sessionStorage cleared');

                // 5. Clear IndexedDB
                addLog('Clearing IndexedDB...');
                if ('indexedDB' in window) {
                    const databases = await indexedDB.databases();
                    for (let db of databases) {
                        if (db.name) {
                            indexedDB.deleteDatabase(db.name);
                            addLog(`✓ Deleted database: ${db.name}`);
                        }
                    }
                }

                // Success
                statusEl.className = 'status success';
                statusEl.textContent = '✅ All cache cleared successfully! Redirecting to login page...';
                addLog('✓ All cache cleared successfully!');
                addLog('Redirecting in 3 seconds...');

                // Redirect after 3 seconds
                setTimeout(() => {
                    window.location.href = '/';
                }, 3000);

            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = '❌ Error clearing cache: ' + error.message;
                addLog('✗ Error: ' + error.message);
                clearBtn.disabled = false;
                clearBtn.textContent = 'Try Again';
            }
        }

        // Auto-clear on load if ?auto=true
        if (window.location.search.includes('auto=true')) {
            clearEverything();
        }
    </script>
</body>
</html>
