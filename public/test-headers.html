<!DOCTYPE html>
<html>
<head>
    <title>Test Department Filtering Headers</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .section {
            background: #f5f5f5;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }
        .success { color: green; }
        .error { color: red; }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        pre {
            background: #fff;
            padding: 10px;
            border: 1px solid #ddd;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 Department Filtering Debug Tool</h1>
    
    <div class="section">
        <h2>Step 1: Check localStorage</h2>
        <button onclick="checkLocalStorage()">Check localStorage</button>
        <pre id="localStorage-result"></pre>
    </div>

    <div class="section">
        <h2>Step 2: Test API Request</h2>
        <button onclick="testOrdersAPI()">Test /api/orders</button>
        <button onclick="testItemsAPI()">Test /api/items</button>
        <pre id="api-result"></pre>
    </div>

    <div class="section">
        <h2>Step 3: Force Set Lazada</h2>
        <button onclick="forceSetLazada()">Force Set Lazada Department</button>
        <button onclick="clearAndReload()">Clear All & Reload</button>
        <pre id="force-result"></pre>
    </div>

    <script>
        function checkLocalStorage() {
            const result = {
                username: localStorage.getItem('username'),
                userRole: localStorage.getItem('userRole'),
                displayName: localStorage.getItem('displayName'),
                assignedChannel: localStorage.getItem('assignedChannel'),
                isLoggedIn: localStorage.getItem('isLoggedIn')
            };

            const resultEl = document.getElementById('localStorage-result');
            resultEl.textContent = JSON.stringify(result, null, 2);

            if (!result.assignedChannel) {
                resultEl.innerHTML += '\n\n<span class="error">❌ ERROR: assignedChannel is missing!</span>';
            } else {
                resultEl.innerHTML += '\n\n<span class="success">✅ assignedChannel found: ' + result.assignedChannel + '</span>';
            }
        }

        async function testOrdersAPI() {
            const resultEl = document.getElementById('api-result');
            resultEl.textContent = 'Loading...';

            try {
                const headers = {
                    'Content-Type': 'application/json',
                    'x-user-username': localStorage.getItem('username'),
                    'x-user-role': localStorage.getItem('userRole'),
                    'x-user-display-name': localStorage.getItem('displayName'),
                    'x-assigned-channel': localStorage.getItem('assignedChannel')
                };

                console.log('📤 Sending headers:', headers);

                const response = await fetch('/api/orders?status=Packed', { headers });
                const data = await response.json();

                const channels = [...new Set(data.map(o => o.sales_channel))];
                
                const result = {
                    totalOrders: data.length,
                    salesChannels: channels,
                    headersSent: headers
                };

                resultEl.textContent = JSON.stringify(result, null, 2);

                if (channels.length > 1) {
                    resultEl.innerHTML += '\n\n<span class="error">❌ PROBLEM: Multiple channels returned!</span>';
                } else if (channels.length === 1) {
                    resultEl.innerHTML += '\n\n<span class="success">✅ OK: Only ' + channels[0] + ' orders returned</span>';
                }
            } catch (error) {
                resultEl.textContent = 'Error: ' + error.message;
            }
        }

        async function testItemsAPI() {
            const resultEl = document.getElementById('api-result');
            resultEl.textContent = 'Loading...';

            try {
                const headers = {
                    'Content-Type': 'application/json',
                    'x-user-username': localStorage.getItem('username'),
                    'x-user-role': localStorage.getItem('userRole'),
                    'x-user-display-name': localStorage.getItem('displayName'),
                    'x-assigned-channel': localStorage.getItem('assignedChannel')
                };

                console.log('📤 Sending headers:', headers);

                const response = await fetch('/api/items', { headers });
                const data = await response.json();

                const channels = [...new Set(data.map(i => i.salesChannel))];
                
                const result = {
                    totalItems: data.length,
                    salesChannels: channels,
                    headersSent: headers
                };

                resultEl.textContent = JSON.stringify(result, null, 2);

                if (channels.length > 1) {
                    resultEl.innerHTML += '\n\n<span class="error">❌ PROBLEM: Multiple channels returned!</span>';
                } else if (channels.length === 1) {
                    resultEl.innerHTML += '\n\n<span class="success">✅ OK: Only ' + channels[0] + ' items returned</span>';
                }
            } catch (error) {
                resultEl.textContent = 'Error: ' + error.message;
            }
        }

        function forceSetLazada() {
            localStorage.setItem('username', 'Lazada-Carlo');
            localStorage.setItem('userRole', 'operations');
            localStorage.setItem('displayName', 'Carlo');
            localStorage.setItem('assignedChannel', 'Lazada');
            localStorage.setItem('isLoggedIn', 'true');

            document.getElementById('force-result').innerHTML = 
                '<span class="success">✅ Lazada department set! Now test the APIs above.</span>';
        }

        function clearAndReload() {
            localStorage.clear();
            sessionStorage.clear();
            location.reload();
        }

        // Auto-check on load
        window.onload = function() {
            checkLocalStorage();
        };
    </script>
</body>
</html>
